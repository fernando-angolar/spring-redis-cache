spring:
  application:
    name: rediscache

  datasource:
    url: jdbc:postgresql://localhost:5432/spring_cache
    username: postgres
    password: 12345
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2s

  cache:
    type: redis

