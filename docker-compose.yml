services:
  redis:
    image: redis:7.2-alpine
    container_name: spring-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: spring-postgres
    environment:
      POSTGRES_DB: spring_cache
      POSTGRES_USER: spring
      POSTGRES_PASSWORD: spring
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spring -d spring_cache"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
